<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Smartphone Addiction Prediction</title>
</head>

<body>
<div class="container">
    <h2>Smartphone Addiction Prediction</h2>

    <form method="POST">
        <div class="form-group">
            <label for="age">Age</label>
            <input type="number" id="age" name="age" min="10" max="60" placeholder="e.g. 21 (range: 10–60)" required>
        </div>

        <div class="form-group">
            <label for="daily_screen_time_hours">Daily Screen Time (hours)</label>
            <input type="number" step="0.01" id="daily_screen_time_hours" name="daily_screen_time_hours" placeholder="e.g. 5.5 (range: 0–16 hrs)" required>
        </div>

        <div class="form-group">
            <label for="social_media_hours">Social Media Hours</label>
            <input type="number" step="0.01" id="social_media_hours" name="social_media_hours" placeholder="e.g. 2.0 (range: 0–8 hrs)" required>
        </div>

        <div class="form-group">
            <label for="gaming_hours">Gaming Hours</label>
            <input type="number" step="0.01" id="gaming_hours" name="gaming_hours" placeholder="e.g. 1.5 (range: 0–6 hrs)" required>
        </div>

        <div class="form-group">
            <label for="work_study_hours">Work/Study Hours</label>
            <input type="number" step="0.01" id="work_study_hours" name="work_study_hours" placeholder="e.g. 4.0 (range: 0–10 hrs)" required>
        </div>

        <div class="form-group">
            <label for="sleep_hours">Sleep Hours</label>
            <input type="number" step="0.01" id="sleep_hours" name="sleep_hours" placeholder="e.g. 7.0 (range: 3–12 hrs)" required>
        </div>

        <div class="form-group">
            <label for="notifications_per_day">Notifications Per Day</label>
            <input type="number" id="notifications_per_day" name="notifications_per_day" placeholder="e.g. 120 (range: 0–250)" required>
        </div>

        <div class="form-group">
            <label for="app_opens_per_day">App Opens Per Day</label>
            <input type="number" id="app_opens_per_day" name="app_opens_per_day" placeholder="e.g. 80 (range: 0–200)" required>
        </div>

        <div class="form-group">
            <label for="weekend_screen_time">Weekend Screen Time (hours)</label>
            <input type="number" step="0.01" id="weekend_screen_time" name="weekend_screen_time" placeholder="e.g. 8.0 (range: 0–20 hrs)" required>
        </div>

        <div class="form-group">
            <label for="academic_work_impact">Academic/Work Impact</label>
            <select id="academic_work_impact" name="academic_work_impact" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <button type="submit">Predict</button>
    </form>

    {% if prediction is not none %}
        {% if prediction == 0 %}
        <div class="result result-cancel">
            Not Addicted - This user does <strong>not</strong> show signs of smartphone addiction
        </div>
        {% elif prediction == 1 %}
        <div class="result result-nocancel">
            Addicted - This user is likely <strong>addicted</strong> to their smartphone
        </div>
        {% endif %}
    {% endif %}
</div>

</body>
</html>
